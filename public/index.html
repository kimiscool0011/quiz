<!doctype html>
<html>
  <head>
    <title>Quiz</title>
  </head>
  <body>
    <h2>Quiz</h2>

    <input
      type="text"
      id="name"
      placeholder="Enter your name"
      required
    /><br /><br />

    <form id="quizForm"></form>
    <button onclick="submitQuiz()">Submit</button>

    <script>
      let questions = [];

      // 🚫 Block if already submitted
      if (localStorage.getItem("submitted")) {
        document.body.innerHTML =
          "<h2>You have already submitted this quiz.</h2>";
      }

      // Load questions
      async function loadQuiz() {
        const res = await fetch("questions.json");
        questions = await res.json();

        const form = document.getElementById("quizForm");

        questions.forEach((q) => {
          const div = document.createElement("div");

          div.innerHTML =
            `<p>${q.question}</p>` +
            q.options
              .map(
                (opt) =>
                  `<label>
          <input type="radio" name="q${q.id}" value="${opt}"> ${opt}
        </label><br>`,
              )
              .join("");

          form.appendChild(div);
        });
      }

      // Submit quiz
      async function submitQuiz() {
        if (localStorage.getItem("submitted")) {
          alert("You already submitted!");
          return;
        }

        if (questions.length === 0) {
          alert("Questions not loaded");
          return;
        }

        const nameInput = document.getElementById("name");
        const name = nameInput.value.trim();

        // ✅ Name validation
        if (!name) {
          alert("Name is required");
          nameInput.style.border = "2px solid red";
          nameInput.focus();
          return;
        } else {
          nameInput.style.border = "";
        }

        // ✅ Confirmation popup
        const confirmSubmit = confirm("Are you sure you want to submit?");
        if (!confirmSubmit) return;

        const form = document.getElementById("quizForm");
        const data = new FormData(form);

        let answers = {};
        let score = 0;

        for (let [k, v] of data.entries()) {
          answers[k] = v;

          const qid = parseInt(k.replace("q", ""));
          const q = questions.find((x) => x.id === qid);

          if (q && q.correct.trim().toLowerCase() === v.trim().toLowerCase()) {
            score++;
          }
        }

        const payload = {
          name,
          answers,
          score,
          total: questions.length,
          timestamp: new Date(),
        };

        await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        // ✅ Prevent future submissions
        localStorage.setItem("submitted", "true");

        alert(`Submitted! Score: ${score}/${questions.length}`);

        // Replace page after submission
        document.body.innerHTML = `<h2>Thank you, ${name}!</h2>
  <p>Your score: ${score}/${questions.length}</p>`;
      }

      loadQuiz();
    </script>
  </body>
</html>
