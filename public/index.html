<!doctype html>
<html>
  <body>
    <h2>Quiz</h2>

    <input type="text" id="name" placeholder="Enter your name" /><br /><br />

    <form id="quizForm"></form>
    <button onclick="submitQuiz()">Submit</button>

    if (localStorage.getItem("submitted")) { document.body.innerHTML = "
    <h2>You have already submitted this quiz.</h2>
    "; }

    <script>
      let questions = [];

      async function loadQuiz() {
        const res = await fetch("questions.json");
        questions = await res.json();

        const form = document.getElementById("quizForm");

        questions.forEach((q) => {
          const div = document.createElement("div");

          div.innerHTML =
            `<p>${q.question}</p>` +
            q.options
              .map(
                (opt) =>
                  `<label>
          <input type="radio" name="q${q.id}" value="${opt}"> ${opt}
        </label><br>`,
              )
              .join("");

          form.appendChild(div);
        });
      }

      async function submitQuiz() {
        if (localStorage.getItem("submitted")) {
          alert("Already submitted");
          return;
        }

        const name = document.getElementById("name").value;

        const form = document.getElementById("quizForm");
        const data = new FormData(form);

        let answers = {};
        let score = 0;

        for (let [k, v] of data.entries()) {
          answers[k] = v;

          const qid = parseInt(k.replace("q", ""));
          const q = questions.find((x) => x.id === qid);

          if (q && q.correct.trim().toLowerCase() === v.trim().toLowerCase()) {
            score++;
          }
        }

        const payload = {
          name,
          answers,
          score,
          total: questions.length,
          timestamp: new Date(),
        };

        await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        localStorage.setItem("submitted", "true"); // ✅ block future attempts

        alert(`Submitted! Score: ${score}/${questions.length}`);
      }

      loadQuiz();
    </script>
  </body>
</html>
