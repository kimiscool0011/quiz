<!DOCTYPE html>
<html>
<body>

<h2>Responses</h2>

<div id="viewer"></div>

<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>

<script>
let responses = [];
let index = 0;

async function load() {
  const res = await fetch('/api/responses');
  responses = await res.json();
  show();
}

function show() {
  if (responses.length === 0) {
    document.getElementById('viewer').innerText = "No responses";
    return;
  }

  const r = responses[index];

  let html = `
    <h3>${index + 1} / ${responses.length}</h3>
    <p><b>Name:</b> ${r.name}</p>
    <p><b>Score:</b> ${r.score} / ${r.total}</p>
    <hr>
  `;

  for (let k in r.answers) {
    html += `<p>${k}: ${r.answers[k]}</p>`;
  }

  document.getElementById('viewer').innerHTML = html;
}

function next() {
  if (index < responses.length - 1) {
    index++;
    show();
  }
}

function prev() {
  if (index > 0) {
    index--;
    show();
  }
}

load();
</script>

</body>
</html>
